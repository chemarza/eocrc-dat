name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff
        run: ruff check .
      - name: isort
        run: isort --check-only .
      - name: black
        run: black --check .
      - name: mypy
        run: mypy eocrc_dat
      - name: pytest
        run: pytest -q
